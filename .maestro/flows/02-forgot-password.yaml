appId: com.besong_oscar.TODOApp
---
# E2E: Forgot password flow
# Tests password reset navigation and form submission

- launchApp:
    clearState: true
- extendedWaitUntil:
    visible: "Get things done"
    timeout: 15000
- tapOn: "Skip"
- assertVisible: "Sign Up"
- tapOn: "Login"
- assertVisible: "Welcome Back"

# Navigate to forgot password
- tapOn: "Forgot Password?"
- assertVisible: "Forgot Password?"
- assertVisible: "Enter your email to receive reset instructions"
- assertVisible: "Email Address"
- assertVisible: "Send Reset Link"

# Fill email and submit
- tapOn: "Email Address"
- inputText: "e2e-test@example.com"
- hideKeyboard
- tapOn: "Send Reset Link"

# Should show success alert
- assertVisible: "Reset Link Sent"
- assertVisible: "Check your email"
- tapOn: "OK"

# Should redirect back to login
- assertVisible: "Welcome Back"
